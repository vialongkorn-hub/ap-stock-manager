<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Stock Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f8f8;--bg2:#ffffff;--bg3:#f2f2f0;
  --border:#e5e5e3;--border2:#d4d4d0;
  --text:#1a1a18;--text2:#6b6b68;--text3:#9b9b98;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --green:#1D9E75;--green-light:#E1F5EE;
  --red:#E24B4A;--red-light:#FCEBEB;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --radius:8px;--radius-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;}
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;background:#1e1b4b;display:flex;flex-direction:column;flex-shrink:0;}
.sb-logo{padding:14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo-box{width:28px;height:28px;background:var(--purple);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0;}
.sb-logo-text{font-size:13px;font-weight:600;color:#fff;}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.4);}
.sb-sec{padding:10px 12px 3px;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.06em;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 11px;margin:1px 8px;border-radius:7px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .12s;border:none;background:none;width:calc(100% - 16px);text-align:left;}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sb-item.active{background:var(--purple);color:#fff;}
.sb-item i{font-size:15px;flex-shrink:0;}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:999px;}
.sb-bottom{margin-top:auto;padding:10px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:8px;padding:7px;}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.sb-uname{font-size:11px;font-weight:500;color:rgba(255,255,255,.8);}
.sb-urole{font-size:10px;color:rgba(255,255,255,.35);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.topbar-title{font-size:14px;font-weight:600;flex:1;}
.tb-btn{font-size:11px;padding:4px 12px;border-radius:999px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;}
.tb-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.content{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
.card-hd{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.metric-lbl{font-size:11px;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.metric-val{font-size:24px;font-weight:700;}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:10px;font-weight:600;color:var(--text2);padding:5px 10px 7px;border-bottom:1px solid var(--border);}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;}
.b-pleno{background:#E6F1FB;color:#0C447C;}
.b-grande{background:#EEEDFE;color:#3C3489;}
.b-bkm{background:#E1F5EE;color:#085041;}
.b-bkme{background:#FAEEDA;color:#633806;}
.b-bkmc{background:#FAECE7;color:#712B13;}
.b-api{background:#EAF3DE;color:#27500A;}
.b-dist{background:#F1EFE8;color:#444441;}
.b-ok{background:#EAF3DE;color:#27500A;}
.b-low{background:#FAEEDA;color:#633806;}
.b-crit{background:#FCEBEB;color:#791F1F;}
.b-pr-open{background:#FAEEDA;color:#633806;}
.b-pr-wait{background:#E6F1FB;color:#0C447C;}
.b-pr-done{background:#EAF3DE;color:#27500A;}
.alert-banner{background:#FCEBEB;border:1px solid #F09595;border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;}
.ai-box{background:var(--purple-light);border-radius:var(--radius);padding:11px 13px;}
.ai-lbl{font-size:10px;font-weight:600;color:#3C3489;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.ai-txt{font-size:11px;color:var(--purple);line-height:1.6;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chip{font-size:11px;padding:3px 12px;border-radius:999px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;}
.chip.active{background:var(--purple);color:#fff;border-color:var(--purple);}
.toggle-group{display:flex;background:var(--bg3);border-radius:999px;padding:2px;gap:2px;}
.toggle-btn{font-size:11px;padding:3px 12px;border-radius:999px;border:none;background:none;color:var(--text2);cursor:pointer;}
.toggle-btn.active{background:var(--bg2);color:var(--text);font-weight:600;box-shadow:0 0 0 1px var(--border);}
.chart-wrap{height:120px;display:flex;align-items:flex-end;gap:6px;padding-top:10px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.bar{border-radius:3px 3px 0 0;width:100%;}
.bar-lbl{font-size:9px;color:var(--text3);text-align:center;}
.bar-val{font-size:9px;color:var(--text2);}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);}
.form-input,.form-select{height:32px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;font-size:12px;background:var(--bg2);color:var(--text);width:100%;font-family:var(--font);}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--purple);}
.qty-input{width:64px;height:26px;border:1px solid var(--border2);border-radius:5px;padding:0 8px;font-size:11px;text-align:center;font-family:var(--font);}
.qty-input:focus{outline:none;border-color:var(--purple);}
.edit-btn{font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;}
.save-btn{font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--purple);background:var(--purple);color:#fff;cursor:pointer;}
.del-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.del-btn:hover{background:#FCEBEB;color:#A32D2D;border-color:#F09595;}
.search-wrap{position:relative;}
.search-input{height:32px;width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px 0 32px;font-size:12px;background:var(--bg2);color:var(--text);font-family:var(--font);}
.search-input:focus{outline:none;border-color:var(--purple);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none;}
.search-dropdown{position:absolute;top:34px;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);z-index:100;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.search-dropdown.open{display:block;}
.search-item{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);}
.search-item:last-child{border:none;}
.search-item:hover{background:var(--bg3);}
.search-item-id{font-weight:600;color:var(--purple);margin-right:6px;}
.pr-line-item{display:grid;grid-template-columns:1fr 80px 24px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.pr-line-item:last-child{border:none;}
.withdraw-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.withdraw-item:last-child{border:none;}
.drill-row{cursor:pointer;}
.drill-row:hover td{background:var(--bg3);}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--purple);cursor:pointer;margin-bottom:10px;background:none;border:none;font-family:var(--font);}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);flex-direction:column;gap:10px;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── EDIT-ONLY LOCK ── */
[data-edit]{transition:opacity .15s;}
[data-edit]:disabled{opacity:0.35;cursor:not-allowed;}

@media(max-width:768px){
  .sidebar{display:none;}
  .shell{flex-direction:column;}
  .main{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:none;}
  .content{flex:1;overflow:hidden;padding:0;display:flex;flex-direction:column;}
  .metrics{grid-template-columns:1fr 1fr;gap:8px;}
  .two-col,.three-col{grid-template-columns:1fr;}
  .card{overflow-x:auto;}
}
</style>
</head>
<body>
<div class="shell">
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-box"><i class="ti ti-building-warehouse"></i></div>
      <div><div class="sb-logo-text">AP Stock</div><div class="sb-logo-sub">BG2 · 2026</div></div>
    </div>
    <div class="sb-sec">หลัก</div>
    <button class="sb-item active" onclick="goTab('overview',this)"><i class="ti ti-layout-dashboard"></i><span>ภาพรวม</span></button>
    <button class="sb-item" onclick="goTab('inventory',this)"><i class="ti ti-packages"></i><span>สินค้าคงคลัง</span></button>
    <button class="sb-item" onclick="goTab('withdraw',this)"><i class="ti ti-transfer-out"></i><span>เบิกสินค้า</span></button>
    <button class="sb-item" onclick="goTab('pr',this)"><i class="ti ti-file-invoice"></i><span>PR Tracking</span><span class="sb-badge" id="pr-badge">0</span></button>
    <div class="sb-sec">ข้อมูล</div>
    <button class="sb-item" onclick="goTab('forecast',this)"><i class="ti ti-trending-up"></i><span>Forecast</span></button>
    <button class="sb-item" onclick="goTab('projects',this)"><i class="ti ti-building"></i><span>โครงการ</span></button>
    <button class="sb-item" onclick="goTab('spec',this)"><i class="ti ti-file-description"></i><span>สเปคสินค้า</span></button>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-avatar">AP</div>
        <div><div class="sb-uname">AP Stock</div><div class="sb-urole">BG2 · 2026–2027</div></div>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">ภาพรวม</div>
      <button class="tb-btn" id="edit-mode-btn" onclick="openPINOverlay()"><i class="ti ti-lock"></i> แก้ไข</button>
      <button class="tb-btn" onclick="openExportDialog()"><i class="ti ti-download"></i> Export</button>
    </div>
    <div class="content" id="main-content">
      <div class="loading"><div class="spinner"></div><div>กำลังโหลดข้อมูล...</div></div>
    </div>
  </div>
</div>

<!-- EXPORT DIALOG -->
<div id="export-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border-radius:16px;padding:28px 32px;width:420px;box-shadow:0 8px 32px rgba(0,0,0,.18);">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
      <i class="ti ti-download" style="font-size:20px;color:var(--purple);"></i>
      <div style="font-size:15px;font-weight:600;">Export ข้อมูล</div>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:20px;">เลือก format และข้อมูลที่ต้องการ export</div>

    <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;">Format</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;">
      <div id="exp-opt-excel" onclick="selectExportFmt('excel')" style="padding:12px;border-radius:10px;border:2px solid var(--purple);background:var(--purple-light);cursor:pointer;">
        <i class="ti ti-file-spreadsheet" style="font-size:20px;color:var(--purple);display:block;margin-bottom:4px;"></i>
        <div style="font-size:13px;font-weight:500;color:var(--purple);">Excel (.xlsx)</div>
        <div style="font-size:11px;color:var(--purple);">หลาย sheet ใน 1 ไฟล์</div>
      </div>
      <div id="exp-opt-pdf" onclick="selectExportFmt('pdf')" style="padding:12px;border-radius:10px;border:1px solid var(--border2);background:none;cursor:pointer;">
        <i class="ti ti-file-type-pdf" style="font-size:20px;color:var(--text2);display:block;margin-bottom:4px;"></i>
        <div style="font-size:13px;font-weight:500;color:var(--text);">PDF</div>
        <div style="font-size:11px;color:var(--text2);">พิมพ์หรือแชร์ได้ง่าย</div>
      </div>
    </div>

    <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;">ข้อมูลที่ต้องการ</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px;">
      <label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;">
        <input type="checkbox" id="exp-inventory" checked style="width:15px;height:15px;accent-color:var(--purple);">
        <i class="ti ti-packages" style="font-size:16px;color:var(--text2);"></i>
        <span style="font-size:13px;">สินค้าคงคลัง</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;">
        <input type="checkbox" id="exp-withdraw" checked style="width:15px;height:15px;accent-color:var(--purple);">
        <i class="ti ti-transfer-out" style="font-size:16px;color:var(--text2);"></i>
        <span style="font-size:13px;">Log การเบิก</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;">
        <input type="checkbox" id="exp-pr" checked style="width:15px;height:15px;accent-color:var(--purple);">
        <i class="ti ti-file-invoice" style="font-size:16px;color:var(--text2);"></i>
        <span style="font-size:13px;">PR Tracking</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;">
        <input type="checkbox" id="exp-projects" checked style="width:15px;height:15px;accent-color:var(--purple);">
        <i class="ti ti-building" style="font-size:16px;color:var(--text2);"></i>
        <span style="font-size:13px;">โครงการ</span>
      </label>
    </div>

    <div style="display:flex;gap:8px;">
      <button onclick="closeExportDialog()" style="flex:1;height:40px;border-radius:9px;border:1px solid var(--border2);background:none;color:var(--text2);font-size:13px;cursor:pointer;">ยกเลิก</button>
      <button onclick="doExport()" style="flex:2;height:40px;border-radius:9px;border:none;background:var(--purple);color:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;">
        <i class="ti ti-download" style="font-size:15px;"></i> Export
      </button>
    </div>
  </div>
</div>

<!-- PIN OVERLAY -->
<div id="pin-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border-radius:16px;padding:28px 32px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.18);text-align:center;">
    <div style="width:44px;height:44px;background:#EEEDFE;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;"><i class="ti ti-lock" style="font-size:22px;color:#534AB7;"></i></div>
    <div style="font-size:15px;font-weight:600;margin-bottom:4px;">โหมดแก้ไข</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:18px;">กรอก PIN เพื่อ unlock</div>
    <input id="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••••"
      autocomplete="new-password"
      style="width:100%;height:44px;border:1.5px solid var(--border2);border-radius:10px;padding:0 14px;font-size:20px;text-align:center;letter-spacing:6px;font-family:var(--font);background:var(--bg);color:var(--text);outline:none;"
      onkeydown="if(event.key==='Enter')confirmPIN()">
    <div id="pin-error" style="font-size:11px;color:var(--red);margin-top:8px;min-height:16px;"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button onclick="closePINOverlay()" style="flex:1;height:38px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-size:13px;">ยกเลิก</button>
      <button onclick="confirmPIN()" style="flex:1;height:38px;border-radius:8px;border:none;background:#534AB7;color:#fff;cursor:pointer;font-size:13px;font-weight:500;">ยืนยัน</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8s2Bs7NyQx1gm72faKajBABDFblOWfFM",
  authDomain: "ap-stock-manager.firebaseapp.com",
  projectId: "ap-stock-manager",
  storageBucket: "ap-stock-manager.firebasestorage.app",
  messagingSenderId: "963440847745",
  appId: "1:963440847745:web:b63a4cc8854e39b2369680",
  measurementId: "G-1NPKS0E087"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let stockData = {};
let prList = [];
let withdrawLog = [];
let currentTab = 'overview';
let currentPeriod = 'week';
let prFilter = 'all';
let selectedProject = null;

// ── EXPORT ──
let exportFmt = 'excel';

window.openExportDialog = function() {
  document.getElementById('export-overlay').style.display = 'flex';
};
window.closeExportDialog = function() {
  document.getElementById('export-overlay').style.display = 'none';
};
window.selectExportFmt = function(f) {
  exportFmt = f;
  const excel = document.getElementById('exp-opt-excel');
  const pdf   = document.getElementById('exp-opt-pdf');
  if (f==='excel') {
    excel.style.border='2px solid var(--purple)'; excel.style.background='var(--purple-light)';
    excel.querySelector('i').style.color='var(--purple)';
    excel.querySelectorAll('div').forEach(d=>d.style.color='var(--purple)');
    pdf.style.border='1px solid var(--border2)'; pdf.style.background='none';
    pdf.querySelector('i').style.color='var(--text2)';
  } else {
    pdf.style.border='2px solid var(--purple)'; pdf.style.background='var(--purple-light)';
    pdf.querySelector('i').style.color='var(--purple)';
    pdf.querySelectorAll('div').forEach(d=>d.style.color='var(--purple)');
    excel.style.border='1px solid var(--border2)'; excel.style.background='none';

function exportExcel(incInventory, incWithdraw, incPR, incProjects) {
  const wb = XLSX.utils.book_new();
  const today = new Date().toLocaleDateString('th-TH');

  if (incInventory) {
    const rows = [['รหัส','ชื่อสินค้า','Vendor','Brand','ราคา','คงเหลือ','Min Stock','สถานะ']];
    productsData.forEach(p => {
      const s = getStatus(p.id);
      rows.push([p.code, p.name, 'CIT', (p.brands||[p.brand]).join(', '), p.price||0, stockData[p.id]?.qty||0, p.min||0, s.txt]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'สินค้าคงคลัง');
  }

  if (incWithdraw) {
    const rows = [['วันที่เบิก','วันที่ติดตั้ง','โครงการ','สินค้า','จำนวน','หมายเหตุ']];
    withdrawLog.forEach(l => {
      rows.push([fmtDate(l.createdAt), l.installDate||'', l.project||'', l.product||'', l.qty||0, l.note||'']);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Log การเบิก');
  }

  if (incPR) {
    const rows = [['เลข PR','โครงการ','สินค้า','Vendor','วันที่','Status']];
    prList.forEach(p => {
      const lines = (p.lines||[]).map(l=>`${l.product} x${l.qty}`).join(', ');
      const s = STATUS_MAP[p.status]?.txt||p.status;
      rows.push([p.prNum||'', p.project||'', lines, p.vendor||'CIT', fmtDate(p.createdAt), s]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'PR Tracking');
  }

  if (incProjects) {
    const rows = [['Plant ID','โครงการ','Brand','Segment','ยูนิต','ไม่ก่อสร้าง','เหลือติดตั้ง','FC/ปี','FC/Q','FC/เดือน','Drive Link']];
    projectsData.forEach(p => {
      rows.push([p.plantId, p.name, p.product||p.brand, p.segment||0, p.totalUnit||0, p.notStarted||0, p.remainingInstall||0, p.fcYear||0, p.fcQuarter||0, p.fcMonth||0, p.driveLink||'']);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'โครงการ');
  }

  XLSX.writeFile(wb, `AP_Stock_BG2_${new Date().toISOString().slice(0,10)}.xlsx`);
}

const EDIT_PIN = '599388';
let editMode = false;

window.openPINOverlay = function() {
  document.getElementById('pin-overlay').style.display = 'flex';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
};
window.closePINOverlay = function() {
  document.getElementById('pin-overlay').style.display = 'none';
};
window.confirmPIN = function() {
  const val = document.getElementById('pin-input').value.trim();
  if (val === EDIT_PIN) {
    editMode = true;
    closePINOverlay();
    updateEditModeUI();
    renderTab(currentTab);
  } else {
    document.getElementById('pin-error').textContent = 'PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
};
window.exitEditMode = function() {
  editMode = false;
  updateEditModeUI();
  renderTab(currentTab);
};

function applyEditState() {
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.disabled = !editMode;
    el.style.opacity = editMode ? '1' : '0.35';
    el.style.cursor = editMode ? '' : 'not-allowed';
  });
}

function updateEditModeUI() {
  // desktop topbar button
  const btn = document.getElementById('edit-mode-btn');
  if (btn) {
    if (editMode) {
      btn.innerHTML = '<i class="ti ti-lock-open"></i> โหมดแก้ไข';
      btn.style.background = '#534AB7';
      btn.style.color = '#fff';
      btn.style.borderColor = '#534AB7';
      btn.onclick = exitEditMode;
    } else {
      btn.innerHTML = '<i class="ti ti-lock"></i> แก้ไข';
      btn.style.background = 'none';
      btn.style.color = 'var(--text2)';
      btn.style.borderColor = 'var(--border2)';
      btn.onclick = openPINOverlay;
    }
  }
  // mobile: re-render เพื่ออัปเดต lock icon ใน header
  if (isMobile()) renderTab(currentTab);
  else applyEditState();
}

let productsData = [...PRODUCTS]; // เริ่มจาก hardcode ก่อน Firebase sync

async function migrateProductBrands() {
  const brandMap = {
    Y02K:['pleno'], Y02H:['pleno'],
    J03:['grande','bkme','bkmc'], J03P:['dist'],
    P60:['bkm'], A2H:['bkm','api'], A2K:['bkm'],
    A100:['grande','bkme','bkmc'], EST:['api']
  };
  const snap = await getDocs(collection(db,'products'));
  for (const d of snap.docs) {
    const data = d.data();
    if (!data.brands || data.brands.length === 0) {
      const brands = brandMap[data.id] || [];
      await updateDoc(doc(db,'products',d.id), {brands, brand:brands[0]||data.brand||'pleno'});
    }
  }
}

async function seedProducts() {
  const snap = await getDocs(collection(db, 'products'));
  if (!snap.empty) return;
  const brandMap = {
    Y02K:['pleno'], Y02H:['pleno'], J03:['grande','bkme','bkmc'], J03P:['dist'],
    P60:['bkm'], A2H:['bkm','api'], A2K:['bkm'], A100:['grande','bkme','bkmc'], EST:['api']
  };
  for (const p of PRODUCTS) {
    await addDoc(collection(db,'products'), {...p, brands: brandMap[p.id]||[], updatedAt:serverTimestamp()});
  }
}

function startListeners() {
  onSnapshot(collection(db,'products'), snap => {
    if (!snap.empty) {
      productsData = snap.docs.map(d => ({docId:d.id, ...d.data()}));
    }
    if (currentTab === 'inventory') renderTab('inventory');
  });
  onSnapshot(query(collection(db,'projects'), orderBy('plantId')), snap => {
    projectsData = snap.docs.map(d => ({docId:d.id, ...d.data()}));
    if (currentTab === 'projects') renderTab('projects');
    if (currentTab === 'withdraw') renderTab('withdraw');
    if (currentTab === 'pr') renderTab('pr');
    if (currentTab === 'overview') renderTab('overview');
    if (currentTab === 'forecast') renderTab('forecast');
  });
  onSnapshot(collection(db, 'stock'), snap => {
    snap.forEach(d => { stockData[d.data().productId] = {docId:d.id, qty:d.data().qty}; });
    if (currentTab === 'inventory') renderTab('inventory');
    if (currentTab === 'overview') renderTab('overview');
  });
  onSnapshot(query(collection(db, 'pr'), orderBy('createdAt','desc')), snap => {
    prList = snap.docs.map(d => ({docId:d.id, ...d.data()}));
    renderPRBadge();
    if (currentTab === 'pr') renderTab('pr');
    if (currentTab === 'overview') renderTab('overview');
  });
  onSnapshot(query(collection(db, 'withdrawLog'), orderBy('createdAt','desc')), snap => {
    withdrawLog = snap.docs.map(d => ({docId:d.id, ...d.data()}));
    if (currentTab === 'withdraw') renderTab('withdraw');
    if (currentTab === 'overview') renderTab('overview');
  });
}

const TAB_TITLES = {overview:'ภาพรวม',inventory:'สินค้าคงคลัง',withdraw:'เบิกสินค้า',pr:'PR Tracking',forecast:'Forecast',projects:'โครงการ',spec:'สเปคสินค้า'};

const isMobile = () => window.matchMedia('(max-width: 768px)').matches;

window.goTab = function(id, el) {
  currentTab = id;
  document.getElementById('page-title').textContent = TAB_TITLES[id] || id;
  document.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderTab(id);
};

function renderTab(id) {
  if (isMobile()) {
    switch(id) {
      case 'overview': renderOverviewMobile(); break;
      case 'inventory': renderInventoryMobile(); break;
      case 'withdraw': renderWithdrawMobile(); break;
      case 'pr': renderPRMobile(); break;
      case 'forecast': renderForecast(); break;
      case 'projects': window.renderProjectsMobile(); break;
      case 'spec': renderSpec(); break;
    }
  } else {
    switch(id) {
      case 'overview': renderOverview(); break;
      case 'inventory': renderInventory(); break;
      case 'withdraw': renderWithdraw(); break;
      case 'pr': renderPRTab(); break;
      case 'forecast': renderForecast(); break;
      case 'projects': window.renderProjects(); break;
      case 'spec': renderSpec(); break;
    }
  }
  // apply disabled state to all [data-edit] elements after every render
  setTimeout(applyEditState, 0);
}

function getStatus(id) {
  const qty = stockData[id]?.qty ?? 0;
  const p = productsData.find(x => x.id === id) || PRODUCTS.find(x => x.id === id);
  const min = p?.min ?? 0;
  if (qty >= min) return {cls:'b-ok',txt:'OK'};
  if (qty >= min * 0.6) return {cls:'b-low',txt:'ต่ำ'};
  return {cls:'b-crit',txt:'วิกฤต'};
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function renderPRBadge() {
  const open = prList.filter(p => p.status === 'open').length;
  const desktopBadge = document.getElementById('pr-badge');
  if (desktopBadge) desktopBadge.textContent = open;
  if (isMobile() && currentTab === 'overview') renderOverviewMobile();
}

window.switchToTab = function(id) {
  currentTab = id;
  if (isMobile()) {
    document.querySelectorAll('.bn-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.bn-item[data-tab="${id}"]`)?.classList.add('active');
  } else {
    document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.sb-item[data-tab="${id}"]`)?.classList.add('active');
    document.getElementById('page-title').textContent = TAB_TITLES[id]||id;
  }
  renderTab(id);
};

window.goTabMobile = function(id) {
  currentTab = id;
  document.querySelectorAll('.bn-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.bn-item[data-tab="${id}"]`)?.classList.add('active');
  renderTab(id);
};

      const d = new Date(today); d.setDate(today.getDate() - (6-i));
      return days[d.getDay()];
    });
    barsHtml = counts.map((v,i) => {
      const h = Math.max(4,(v/maxVal)*90);
      return `<div class="bar-col"><div class="bar-val">${v||''}</div><div class="bar" style="height:${h}px;background:${colors[i%colors.length]};"></div><div class="bar-lbl">${labels[i]}</div></div>`;
    }).join('');
  } else {
    const monthNames = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    const counts = Array(6).fill(0);
    const now = new Date();
    withdrawLog.forEach(l => {
      if (!l.createdAt) return;
      const d = l.createdAt.toDate ? l.createdAt.toDate() : new Date(l.createdAt);
      const monthDiff = (now.getFullYear()-d.getFullYear())*12 + now.getMonth()-d.getMonth();
      if (monthDiff >= 0 && monthDiff < 6) counts[5-monthDiff] += (l.qty||0);
    });
    const maxVal = Math.max(...counts, 1);
    const labels = Array.from({length:6}, (_,i) => {
      const d = new Date(now.getFullYear(), now.getMonth()-(5-i), 1);
      return monthNames[d.getMonth()];
    });
    barsHtml = counts.map((v,i) => {
      const h = Math.max(4,(v/maxVal)*90);
      return `<div class="bar-col"><div class="bar-val">${v||''}</div><div class="bar" style="height:${h}px;background:${colors[i%colors.length]};"></div><div class="bar-lbl">${labels[i]}</div></div>`;
    }).join('');
  }

  // ── ตารางสรุปตาม Brand จาก projectsData จริง ──
  const brandSummary = {};
  projectsData.forEach(p => {
    const b = p.brand;
    if (!brandSummary[b]) brandSummary[b] = {count:0, units:0, fc:0};
    brandSummary[b].count++;
    brandSummary[b].units += p.totalUnit||0;
    brandSummary[b].fc += p.fcYear||0;
  });
  const brandRows = Object.entries(BRAND_CFG).filter(([k])=>brandSummary[k]).map(([k,d])=>`
    <tr><td><span class="badge ${d.badge}">${d.label}</span></td>
    <td>${brandSummary[k].count}</td>
    <td>${brandSummary[k].units.toLocaleString()}</td>
    <td>${brandSummary[k].fc.toFixed(0)}</td>
    <td style="font-size:10px;">${d.lock}</td></tr>`).join('');

  // ── AI Insight จากข้อมูลจริง ──
  const topBrand = Object.entries(brandSummary).sort((a,b)=>b[1].units-a[1].units)[0];
  const topBrandPct = topBrand ? Math.round(topBrand[1].units/totalUnits*100) : 0;
  const critStock = productsData.filter(p=>getStatus(p.id).cls==='b-crit').map(p=>p.name);
  const aiTxt = [
    topBrand ? `${BRAND_CFG[topBrand[0]]?.label||topBrand[0]} ครอง ${topBrandPct}% ของยูนิตทั้งหมด` : '',
    critStock.length ? `สต็อควิกฤต: ${critStock.join(', ')} — ควรเปิด PR ด่วน` : 'สต็อคทุกรายการอยู่ในเกณฑ์ดี',
    `PR เปิดอยู่ ${openPR} รายการ · เบิกวันนี้ ${todayW} ครั้ง`
  ].filter(Boolean).join(' · ');

  document.getElementById('main-content').innerHTML = `
    ${alertHtml}
    <div class="metrics">
      <div class="metric"><div class="metric-lbl"><i class="ti ti-building"></i> โครงการ</div><div class="metric-val">${totalProjects}</div><div class="metric-sub">${brands} Brands</div></div>
      <div class="metric"><div class="metric-lbl"><i class="ti ti-home"></i> เหลือติดตั้ง</div><div class="metric-val">${totalUnits.toLocaleString()}</div><div class="metric-sub">ทุกโครงการ</div></div>
      <div class="metric"><div class="metric-lbl"><i class="ti ti-transfer-out"></i> เบิกวันนี้</div><div class="metric-val">${todayW}</div><div class="metric-sub">รายการ</div></div>
      <div class="metric"><div class="metric-lbl"><i class="ti ti-file-invoice"></i> PR เปิดอยู่</div><div class="metric-val" style="color:var(--red);">${openPR}</div><div class="metric-sub">รายการ</div></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="card-hd" style="margin-bottom:0;"><i class="ti ti-chart-bar"></i> ยอดเบิกสินค้า (ชิ้น)</div>
        <div class="toggle-group">
          <button class="toggle-btn ${currentPeriod==='week'?'active':''}" onclick="switchPeriod('week')">รายอาทิตย์</button>
          <button class="toggle-btn ${currentPeriod==='month'?'active':''}" onclick="switchPeriod('month')">รายเดือน</button>
        </div>
      </div>
      <div class="chart-wrap">${barsHtml}</div>
    </div>
    <div class="two-col">
      <div class="card">
        <div class="card-hd"><i class="ti ti-building"></i> สรุปตาม Brand</div>
        <table><thead><tr><th>Brand</th><th>โครงการ</th><th>ยูนิต</th><th>FC/ปี</th><th>Door Lock</th></tr></thead>
        <tbody>${brandRows}</tbody></table>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card"><div class="card-hd"><i class="ti ti-transfer-out"></i> เบิกล่าสุด</div>${recentLog}</div>
        <div class="ai-box"><div class="ai-lbl"><i class="ti ti-sparkles"></i> AI Insight</div><div class="ai-txt">${aiTxt}</div></div>
      </div>

}

let fcChart = null;
let customFCData = {month:Array(12).fill(0), quarter:Array(4).fill(0), product:{}};
let currentFCView = 'month';

async function loadCustomFC() {
  try {
    const snap = await getDocs(collection(db,'customFC'));
    snap.forEach(d => {
      const data = d.data();
      if (data.type === 'month') customFCData.month = data.values||Array(12).fill(0);
      if (data.type === 'quarter') customFCData.quarter = data.values||Array(4).fill(0);
      if (data.type === 'product') customFCData.product = data.values||{};
    });
  } catch(e) { console.error(e); }
}

window.saveCustomFC = async function(type) {
  const MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  let values;
  if (type==='month') {
    values = MONTHS_TH.map((_,i)=>parseInt(document.getElementById('fc-m-'+i)?.value)||0);
    customFCData.month = values;
  } else if (type==='quarter') {
    values = [0,1,2,3].map(i=>parseInt(document.getElementById('fc-q-'+i)?.value)||0);
    customFCData.quarter = values;
  } else {
    values = {};
    productsData.forEach(p=>{ values[p.id] = parseInt(document.getElementById('fc-p-'+p.id)?.value)||0; });
    customFCData.product = values;
  }
  // upsert to Firebase
  const snap = await getDocs(collection(db,'customFC'));
  let existing = null;
  snap.forEach(d=>{ if(d.data().type===type) existing=d.id; });
  if (existing) await updateDoc(doc(db,'customFC',existing),{type,values,updatedAt:serverTimestamp()});
  else await addDoc(collection(db,'customFC'),{type,values,updatedAt:serverTimestamp()});
  initFCChart();
};

window.updateFCChartLive = function() {
  if (!fcChart) return;

  fcChart.update('none');
  updateFCStats(currentFCView, custom);

function getCustomFCValues(v) {
  const MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  if (v==='month') {
    const now = new Date();
    return Array.from({length:6},(_,i)=>{
      const monthIdx = (now.getMonth()-(5-i)+12)%12;
      const el = document.getElementById('fc-m-'+monthIdx);
      return el ? parseInt(el.value)||0 : customFCData.month[monthIdx]||0;
    });
  }
  if (v==='quarter') return [0,1,2,3].map(i=>{ const el=document.getElementById('fc-q-'+i); return el?parseInt(el.value)||0:customFCData.quarter[i]||0; });
  return productsData.map(p=>{ const el=document.getElementById('fc-p-'+p.id); return el?parseInt(el.value)||0:customFCData.product[p.id]||0; });
}

function initFCChart() {
  const canvas = document.getElementById('fc-chart');
  if (!canvas) return;
  if (fcChart) { fcChart.destroy(); fcChart = null; }
  buildFCInputs();

  const now = new Date();
  const MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const monthLabels = Array.from({length:6},(_,i)=>{ const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1); return MONTHS_TH[d.getMonth()]; });
  const totalFCMonth = projectsData.reduce((s,p)=>s+(p.fcMonth||0),0);
  const fcMonthData = monthLabels.map(()=>Math.round(totalFCMonth));
  const actMonthData = Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-(5-i),1);
    return withdrawLog.filter(l=>{ if(!l.createdAt) return false; const ld=l.createdAt.toDate?l.createdAt.toDate():new Date(l.createdAt); return ld.getFullYear()===d.getFullYear()&&ld.getMonth()===d.getMonth(); }).reduce((s,l)=>s+(l.qty||0),0);
  });

  const totalFCQ = projectsData.reduce((s,p)=>s+(p.fcQuarter||0),0);
  const fcQData = [0,1,2,3].map(()=>Math.round(totalFCQ));
  const actQData = [0,1,2,3].map(i=>{ const qs=new Date(now.getFullYear(),i*3,1),qe=new Date(now.getFullYear(),i*3+3,0); return withdrawLog.filter(l=>{ if(!l.createdAt) return false; const ld=l.createdAt.toDate?l.createdAt.toDate():new Date(l.createdAt); return ld>=qs&&ld<=qe; }).reduce((s,l)=>s+(l.qty||0),0); });

  const prodLabels = productsData.map(p=>p.name.replace('Kudos ',''));
  const fcProdData = productsData.map(p=>{ const brands=p.brands||[]; return Math.round(projectsData.filter(proj=>brands.includes(proj.brand)).reduce((s,proj)=>s+(proj.fcMonth||0),0)); });
  const actProdData = productsData.map(p=>withdrawLog.filter(l=>l.productId===p.id).reduce((s,l)=>s+(l.qty||0),0));

  window._fcViews = {
    month:{labels:monthLabels, plan:fcMonthData, act:actMonthData},
    quarter:{labels:['Q1','Q2','Q3','Q4'], plan:fcQData, act:actQData},
    product:{labels:prodLabels, plan:fcProdData, act:actProdData},
  };

  const customData = getCustomFCValues('month');
  fcChart = new Chart(canvas, {
    type:'bar',
    data:{
      labels:window._fcViews.month.labels,
      datasets:[
        {label:'FC แผน',data:window._fcViews.month.plan,backgroundColor:'#534AB7',borderRadius:4,barPercentage:0.28,categoryPercentage:0.9},
        {label:'FC ตั้งเอง',data:customData,backgroundColor:'#E24B4A',borderRadius:4,barPercentage:0.28,categoryPercentage:0.9},
        {label:'เบิกจริง',data:window._fcViews.month.act,backgroundColor:'#1D9E75',borderRadius:4,barPercentage:0.28,categoryPercentage:0.9}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11},maxRotation:45}},y:{grid:{color:'#e1e0d9'},ticks:{font:{size:11}},beginAtZero:true}}
    }
  });
  updateFCStats('month', customData);
}

window.switchFCView = function(v) {
  currentFCView = v;
  ['month','quarter','product'].forEach(id=>{
    const btn = document.getElementById('fc-btn-'+id);
    if (btn) btn.classList.toggle('active', v===id);
    const sec = document.getElementById('fc-set-'+id);
    if (sec) sec.style.display = v===id?'':'none';
  });
  if (!fcChart||!window._fcViews) return;
  const d = window._fcViews[v];
  const custom = getCustomFCValues(v);
  fcChart.data.labels = d.labels;
  fcChart.data.datasets[0].data = d.plan;
  fcChart.data.datasets[1].data = custom;
  fcChart.data.datasets[2].data = d.act;
  fcChart.update();
  updateFCStats(v, custom);
};

function updateFCStats(v, custom) {
  if (!window._fcViews) return;
  const d = window._fcViews[v];
  const tPlan   = d.plan.reduce((s,x)=>s+x,0);
  const tCustom = (custom||getCustomFCValues(v)).reduce((s,x)=>s+x,0);
  const tAct    = d.act.reduce((s,x)=>s+x,0);
  const pct = tCustom>0?Math.round(tAct/tCustom*100):0;
  const fcEl  = document.getElementById('fc-stat-fc');
  const cusEl = document.getElementById('fc-stat-custom');
  const actEl = document.getElementById('fc-stat-act');
  const pctEl = document.getElementById('fc-stat-pct');
  if (fcEl)  fcEl.textContent  = tPlan.toLocaleString();
  if (cusEl) cusEl.textContent = tCustom.toLocaleString();
  if (actEl) actEl.textContent = tAct.toLocaleString();
  if (pctEl) { pctEl.textContent=pct+'%'; pctEl.style.color=pct<50?'#E24B4A':pct<80?'#BA7517':'#1D9E75'; }
}

window.addNpBrandRow = function() {
  const sel = document.getElementById('np-brand-add-select');

  const list = document.getElementById('np-brand-list');

window.addProduct = async function() {
  const id    = document.getElementById('np-prod-id')?.value.trim().toUpperCase();
  const code  = document.getElementById('np-prod-code')?.value.trim();
  const name  = document.getElementById('np-prod-name')?.value.trim();
  const price = parseFloat(document.getElementById('np-prod-price')?.value)||0;
  const min   = parseInt(document.getElementById('np-prod-min')?.value)||0;
  const list  = document.getElementById('np-brand-list');
  const brands = list?._brands || [];
  if (!id || !name) { alert('กรุณากรอก ID และชื่อสินค้า'); return; }
  if (productsData.find(p=>p.id===id)) { alert('ID นี้มีอยู่แล้ว'); return; }
  await addDoc(collection(db,'products'), {id, code:code||`DDL-${id}`, name, vendor:'CIT', brand:brands[0]||'pleno', brands, price, min, updatedAt:serverTimestamp()});
  await addDoc(collection(db,'stock'), {productId:id, qty:0, updatedAt:serverTimestamp()});
  ['np-prod-id','np-prod-code','np-prod-name','np-prod-price','np-prod-min'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});
  if (list) { list.innerHTML=''; list._brands=[]; }

window.addBrandRow = function(id) {
  const sel = document.getElementById('brand-add-select-'+id);
  const k = sel?.value;
  if (!k) return;
  const list = document.getElementById('brand-list-'+id);
  if (!list || list._brands.includes(k)) return;
  list._brands.push(k);
  const cfg = BRAND_CFG[k];
  const badgeCls = {pleno:'b-pleno',grande:'b-grande',bkm:'b-bkm',bkme:'b-bkme',bkmc:'b-bkmc',api:'b-api',dist:'b-dist'}[k]||'b-ok';
  const div = document.createElement('div');
  div.id = `brand-row-${id}-${k}`;
  div.style.cssText = 'display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--border);';
  div.innerHTML = `<span class="badge ${badgeCls}" style="font-size:11px;">${cfg?.label||k}</span>
    <button class="del-btn" onclick="removeBrandRow('${id}','${k}')" style="width:20px;height:20px;"><i class="ti ti-x" style="font-size:10px;"></i></button>`;
  list.appendChild(div);
  // remove from dropdown
  sel.querySelector(`option[value="${k}"]`)?.remove();
  sel.value = '';
};

window.removeBrandRow = function(id, k) {
  const list = document.getElementById('brand-list-'+id);
  if (!list) return;
  list._brands = list._brands.filter(b=>b!==k);
  document.getElementById(`brand-row-${id}-${k}`)?.remove();
  // add back to dropdown
  const sel = document.getElementById('brand-add-select-'+id);
  if (sel) {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = BRAND_CFG[k]?.label||k;
    sel.appendChild(opt);
  }
};

window.saveProduct = async function(id) {
  const p = productsData.find(x=>x.id===id);

  const list = document.getElementById('brand-list-'+id);

  const price  = parseInt(document.getElementById('ep-price-'+id)?.value)||0;
  const min    = parseInt(document.getElementById('ep-min-'+id)?.value)||0;
  await updateDoc(doc(db,'products',p.docId), {price, min, brands, brand:brands[0]||p.brand, updatedAt:serverTimestamp()});
};

window.deleteProduct = async function(id) {
  const p = productsData.find(x=>x.id===id);

window.onSearch = function(q) {
  const dd = document.getElementById('wd-dropdown');

  const res = getAllProjects().filter(p=>p.id.includes(q)||p.name.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if (!res.length) { dd?.classList.remove('open'); return; }
  dd.innerHTML = res.map(p=>`<div class="search-item" onclick="selectProject('${p.id}','${p.name}','${p.brand}')"><span class="search-item-id">${p.id}</span>${p.name}</div>`).join('');

};
window.selectProject = function(id, name, brand) {
  selectedProject = {id, name, brand};
  const searchEl = document.getElementById('wd-search') || document.getElementById('wd-search-mb');
  if (searchEl) searchEl.value = `${id} · ${name}`;
  document.getElementById('wd-dropdown').classList.remove('open');
  document.getElementById('wd-selected').textContent = `Brand: ${brand.toUpperCase()} · map สินค้าอัตโนมัติ`;
  const items = (getBrandItems(brand).length>0?getBrandItems(brand):(BRAND_ITEMS_DEFAULT[brand]||[])).map(pid=>productsData.find(p=>p.id===pid)).filter(Boolean);
  document.getElementById('wd-item-list').innerHTML = items.map(it=>`

      <div style="flex:1;"><div style="font-size:12px;font-weight:600;">${it.name}</div>

window.confirmWithdraw = async function() {
  if (!selectedProject) return;
  const items = (getBrandItems(selectedProject.brand).length>0?getBrandItems(selectedProject.brand):(BRAND_ITEMS_DEFAULT[selectedProject.brand]||[])).map(pid=>productsData.find(p=>p.id===pid)).filter(Boolean);
  let ok = false;
  for (const it of items) {
    const q = parseInt(document.getElementById('wd-'+it.id)?.value)||0;
    if (q > 0) {
      ok = true;
      const docId = stockData[it.id]?.docId;
      const newQty = Math.max(0,(stockData[it.id]?.qty||0)-q);
      if (docId) await updateDoc(doc(db,'stock',docId),{qty:newQty,updatedAt:serverTimestamp()});
      await addDoc(collection(db,'withdrawLog'),{
        project:selectedProject.name, projectId:selectedProject.id,
        product:it.name, productId:it.id, qty:q,
        brand:selectedProject.brand, note:document.getElementById('wd-note')?.value||'',
        installDate:document.getElementById('wd-install-date')?.value||'',
        createdAt:serverTimestamp()
      });
    }
  }
  if (!ok) { alert('กรุณากรอกจำนวนที่ต้องการเบิก'); return; }
  selectedProject = null;
  const searchEl = document.getElementById('wd-search') || document.getElementById('wd-search-mb');
  if (searchEl) searchEl.value = '';
  document.getElementById('wd-selected').textContent = '';
  document.getElementById('wd-items').style.display = 'none';
  document.getElementById('wd-placeholder').style.display = '';
};
window.filterLog = function(btn, brand) {

};

window.submitPR = async function() {
  const num = document.getElementById('pr-num')?.value.trim();
  if (!num) { alert('กรุณากรอกเลขที่ PR'); return; }
  const lineEls = document.querySelectorAll('#pr-lines .pr-line-item');
  if (!lineEls.length) { alert('กรุณาเพิ่มรายการสินค้า'); return; }
  const lines = [];
  lineEls.forEach(el=>{const sel=el.querySelector('select');const inp=el.querySelector('input');const q=parseInt(inp?.value)||0;if(q>0)lines.push({product:sel.value,qty:q});});
  if (!lines.length) { alert('กรุณากรอกจำนวนสินค้า'); return; }
  const projVal = document.getElementById('pr-project')?.value.split('|');
  await addDoc(collection(db,'pr'),{prNum:num,project:projVal?.[1]||'',projectId:projVal?.[0]||'',vendor:'CIT',lines,status:'open',createdAt:serverTimestamp()});
};

        🗑 ลบ PR + หักสต็อกคืน
      </button>` : ''}
      <button id="del-pr-only" style="width:100%;height:40px;border-radius:9px;border:1px solid var(--border2);background:none;color:var(--text);font-size:13px;cursor:pointer;margin-bottom:8px;font-family:var(--font);">
        ลบ PR อย่างเดียว
      </button>
      <button id="del-pr-cancel" style="width:100%;height:40px;border-radius:9px;border:none;background:var(--bg3);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font);">
        ยกเลิก
      </button>
    </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#del-pr-cancel').onclick = () => overlay.remove();

  overlay.querySelector('#del-pr-only').onclick = async () => {
    overlay.remove();
    await deleteDoc(doc(db,'pr',docId));
  };

  if (isDone) {
    overlay.querySelector('#del-pr-stock').onclick = async () => {
      overlay.remove();
      // หักสต็อกคืน
      const prSnap = await getDoc(doc(db,'pr',docId));
      const lines = prSnap.data()?.lines || [];
      for (const l of lines) {
        const sid = STOCK_MAP[l.product];
        if (sid && stockData[sid]?.docId) {
          const newQty = Math.max(0, (stockData[sid]?.qty||0) - (parseInt(l.qty)||0));
          await updateDoc(doc(db,'stock',stockData[sid].docId),{qty:newQty,updatedAt:serverTimestamp()});
          stockData[sid].qty = newQty;
        }
      }
      await deleteDoc(doc(db,'pr',docId));
    };
  }
};

window.updatePR = async function(docId, newStatus) {
  await updateDoc(doc(db,'pr',docId),{status:newStatus});
  if (newStatus==='done') {
    try {
      const prSnap = await getDoc(doc(db,'pr',docId));
      const lines = prSnap.data()?.lines || [];
      for (const l of lines) {
        const sid = STOCK_MAP[l.product];
        if (sid && stockData[sid]?.docId) {
          const newQty = (stockData[sid]?.qty||0) + (parseInt(l.qty)||0);
          await updateDoc(doc(db,'stock',stockData[sid].docId),{qty:newQty,updatedAt:serverTimestamp()});
          stockData[sid].qty = newQty;
        }
      }
    } catch(e) { console.error('updatePR stock error:',e); }
  }
};

window.saveProjInline = async function(docId) {
  const name  = document.getElementById('e-name-'+docId)?.value.trim();
  const seg   = parseInt(document.getElementById('e-seg-'+docId)?.value)||0;
  const unit  = parseInt(document.getElementById('e-unit-'+docId)?.value)||0;
  const ri    = parseInt(document.getElementById('e-ri-'+docId)?.value)||0;
  const fy    = parseFloat(document.getElementById('e-fy-'+docId)?.value)||0;
  const drive = document.getElementById('e-drive-'+docId)?.value.trim()||'';
  if (!name) { alert('กรุณากรอกชื่อโครงการ'); return; }
  const fq = parseFloat((fy/4).toFixed(2));
  const fm = parseFloat((fy/12).toFixed(2));
  await updateDoc(doc(db,'projects',docId), {name, segment:seg, totalUnit:unit, remainingInstall:ri, fcYear:fy, fcQuarter:fq, fcMonth:fm, driveLink:drive, updatedAt:serverTimestamp()});
  const idx = projectsData.findIndex(x=>x.docId===docId);
  if (idx>=0) Object.assign(projectsData[idx], {name, segment:seg, totalUnit:unit, remainingInstall:ri, fcYear:fy, fcQuarter:fq, fcMonth:fm, driveLink:drive});
  filterProjectsDesktop(document.getElementById('proj-search')?.value||'');
};

window.saveProject = async function(docId, brandKey) {
  const name   = document.getElementById('e-name-'+docId)?.value.trim();
  const seg    = parseInt(document.getElementById('e-seg-'+docId)?.value)||0;
  const unit   = parseInt(document.getElementById('e-unit-'+docId)?.value)||0;
  const ns     = parseInt(document.getElementById('e-ns-'+docId)?.value)||0;
  const ri     = parseInt(document.getElementById('e-ri-'+docId)?.value)||0;
  const fy     = parseFloat(document.getElementById('e-fy-'+docId)?.value)||0;
  const fq     = parseFloat(document.getElementById('e-fq-'+docId)?.value)||0;
  const fm     = parseFloat(document.getElementById('e-fm-'+docId)?.value)||0;
  const drive  = document.getElementById('e-drive-'+docId)?.value.trim()||'';
  if (!name) { alert('กรุณากรอกชื่อโครงการ'); return; }
  await updateDoc(doc(db,'projects',docId), {
    name, segment:seg, totalUnit:unit, notStarted:ns,
    remainingInstall:ri, fcYear:fy, fcQuarter:fq, fcMonth:fm,
    driveLink:drive, updatedAt:serverTimestamp()
  });
  const idx = projectsData.findIndex(x => x.docId === docId);
  if (idx >= 0) Object.assign(projectsData[idx], {name, segment:seg, totalUnit:unit, notStarted:ns, remainingInstall:ri, fcYear:fy, fcQuarter:fq, fcMonth:fm, driveLink:drive});
  cancelEditProject(docId, brandKey);
};

  const p = projectsData.find(x=>x.docId===docId);

  const units    = parseInt(document.getElementById('ht-units')?.value)||0;

  const types = [...(p.houseTypes||[]), {typeName, units, doorLock, status, note}];

window.deleteHouseType = async function(docId, brandKey, index) {
  const p = projectsData.find(x=>x.docId===docId);
  if (!p) return;
  if (!confirm('ลบ Type นี้ออก?')) return;
  const types = (p.houseTypes||[]).filter((_,i)=>i!==index);
  await updateDoc(doc(db,'projects',docId), {houseTypes:types, updatedAt:serverTimestamp()});
  const idx = projectsData.findIndex(x=>x.docId===docId);
  if (idx>=0) projectsData[idx].houseTypes = types;

window.addProject = async function() {
  const plantId = document.getElementById('np-plant')?.value.trim();
  const name    = document.getElementById('np-name')?.value.trim();
  const brand   = document.getElementById('np-brand')?.value;
  const seg     = parseInt(document.getElementById('np-seg')?.value)||0;
  const unit    = parseInt(document.getElementById('np-unit')?.value)||0;
  const ns      = parseInt(document.getElementById('np-ns')?.value)||0;
  const ri      = parseInt(document.getElementById('np-ri')?.value)||0;
  const fy      = parseFloat(document.getElementById('np-fy')?.value)||0;
  const fq      = parseFloat(document.getElementById('np-fq')?.value)||0;
  const fm      = parseFloat((fq/3).toFixed(2));
  if (!plantId || !name) { alert('กรุณากรอก Plant ID และชื่อโครงการ'); return; }
  const product = Object.entries(PRODUCT_TO_BRAND).find(([,v])=>v===brand)?.[0]||brand;
  await addDoc(collection(db,'projects'), {
    plantId, name, product, brand, bg:'TH', segment:seg,
    totalUnit:unit, notStarted:ns, remaining2026:0, remainingInstall:ri,
    fcYear:fy, fcQuarter:fq, fcMonth:fm, driveLink:'', houseTypes:[],
    updatedAt:serverTimestamp()
  });
  // clear form
  ['np-plant','np-name','np-seg','np-unit','np-ns','np-ri','np-fy','np-fq'].forEach(id=>{
    const el = document.getElementById(id); if(el) el.value='';
  });
};

window.deleteProject = async function(docId, brandKey) {
  const p = projectsData.find(x => x.docId === docId);
  if (!p) return;
  if (!confirm(`ลบ "${p.name}" ออกจากระบบ?\nไม่สามารถกู้คืนได้`)) return;
  await deleteDoc(doc(db,'projects',docId));
  projectsData = projectsData.filter(x => x.docId !== docId);
  if (brandKey === 'mb') window.renderProjectsMobile();
  else if (brandKey === 'desktop' || brandKey === 'all') filterProjectsDesktop(document.getElementById('proj-search')?.value||'');
  else showBrand(brandKey);
};

function renderSpec() {
  // groupสินค้าตาม brand
  const brandGroups = {};
  Object.keys(BRAND_CFG).forEach(b => { brandGroups[b] = []; });
  productsData.forEach(p => {
    (p.brands||[p.brand]).forEach(b => {
      if (brandGroups[b]) brandGroups[b].push(p);
    });
  });

  const rows = Object.entries(BRAND_CFG).map(([b, cfg]) => {
    const items = brandGroups[b]||[];
    if (!items.length) return '';
    return items.map((p, i) => `
      <tr>
        ${i===0 ? `<td rowspan="${items.length}"><span class="badge ${cfg.badge}">${cfg.label}</span></td>` : ''}
        <td style="font-size:11px;color:var(--text2);">${p.code}</td>
        <td>${p.name}</td>
        <td>${p.price ? p.price.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</td>
        <td>CIT</td>
      </tr>`).join('');
  }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="card">
      <div class="card-hd"><i class="ti ti-file-description"></i> สเปคสินค้า — BG2 REV.1 · 2026–2027</div>
      <table><thead><tr><th>Brand</th><th>รหัส</th><th>สินค้า</th><th>ราคา ex VAT</th><th>Vendor</th></tr></thead>
      <tbody>${rows}</tbody></table>
      <div style="font-size:11px;color:var(--text3);margin-top:10px;">* ข้อมูลดึงจากสินค้าคงคลัง — แก้ไขได้ที่หน้าสินค้าคงคลัง</div>
    </div>`;
}

const MB_HD = '#1e1b4b';
const MB_TEXT = '#fff';
const MB_SUB = 'rgba(255,255,255,.55)';
const MB_CHIP = 'border:0.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);';
const MB_CHIP_ON = 'background:#fff;color:#1e1b4b;border:0.5px solid #fff;font-weight:500;';

function mbHd(title, sub, rightHtml='', chipHtml='', searchHtml='') {
  return `<div style="background:${MB_HD};padding:12px 14px ${chipHtml||searchHtml?'0':'14px'};">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0;">
      <div><div style="font-size:16px;font-weight:500;color:${MB_TEXT};">${title}</div>${sub?`<div style="font-size:11px;color:${MB_SUB};margin-top:2px;">${sub}</div>`:''}</div>
      <div style="display:flex;align-items:center;gap:6px;">${rightHtml}${mbLockBtn()}</div>
    </div>
    ${searchHtml?`<div style="display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);border-radius:7px;padding:6px 10px;margin-top:10px;margin-bottom:12px;"><i class="ti ti-search" style="font-size:14px;color:rgba(255,255,255,.5);" aria-hidden="true"></i><span style="font-size:12px;color:rgba(255,255,255,.5);">${searchHtml}</span></div>`:''}
    ${chipHtml?`<div style="display:flex;gap:6px;overflow-x:auto;padding:10px 0 12px;">${chipHtml}</div>`:''}
  </div>`;
}
function mbChip(label, active=false, onclick='') {
  return `<button style="font-size:11px;padding:4px 12px;border-radius:999px;white-space:nowrap;flex-shrink:0;cursor:pointer;${active?MB_CHIP_ON:MB_CHIP}" onclick="${onclick}">${label}</button>`;

function mbHdBtn(icon, round=true) {

function mbCard(hd, body) {

}
function mbRow(iconBg, iconColor, icon, name, sub, rightHtml, prog='', progColor='') {

function mbMetric(lbl, val, valColor='') {
  return `<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;">

function mbBadge(txt, cls) {

  const [bg,color]=map[cls]||map.ok;
  return `<span style="display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;background:${bg};color:${color};">${txt}</span>`;

function mbBn(active) {
  const items=[['layout-dashboard','ภาพรวม','overview'],['packages','สินค้า','inventory'],['transfer-out','เบิก','withdraw'],['file-invoice','PR','pr'],['building','โครงการ','projects']];

  const currentBrands = p.brands||[];
  const badgeCls = (k) => ({pleno:'b-pleno',grande:'b-grande',bkm:'b-bkm',bkme:'b-bkme',bkmc:'b-bkmc',api:'b-api',dist:'b-dist'}[k]||'b-ok');
  const brandRows = currentBrands.map(k=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;border:0.5px solid var(--border);margin-bottom:4px;" id="mb-brand-row-${id}-${k}">
      <span class="badge ${badgeCls(k)}">${BRAND_CFG[k]?.label||k}</span>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:2px;">ราคา</div>
          <input class="form-input" step="0.01" id="mb-ep-price-${id}" type="number" value="${p.price||0}" style="height:32px;font-size:12px;"></div>

          <input class="form-input" id="mb-ep-min-${id}" type="number" value="${p.min||0}" style="height:32px;font-size:12px;"></div>

      <div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px;">Brand ที่ใช้สินค้านี้</div>

        </div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="save-btn" style="flex:1;height:32px;font-size:12px;" onclick="mbSaveProduct('${id}')">บันทึก</button>
        <button class="edit-btn" style="flex:1;height:32px;font-size:12px;" onclick="renderInventoryMobile()">ยกเลิก</button>

window.mbAddBrandRow = function(id) {
  const sel = document.getElementById('mb-brand-add-select-'+id);
  const k = sel?.value;
  if (!k) return;
  const list = document.getElementById('mb-brand-list-'+id);
  if (!list || list._brands.includes(k)) return;
  list._brands.push(k);
  const bc = {pleno:'b-pleno',grande:'b-grande',bkm:'b-bkm',bkme:'b-bkme',bkmc:'b-bkmc',api:'b-api',dist:'b-dist'}[k]||'b-ok';
  const div = document.createElement('div');
  div.id = `mb-brand-row-${id}-${k}`;
  div.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;border:0.5px solid var(--border);margin-bottom:4px;';
  div.innerHTML = `<span class="badge ${bc}">${BRAND_CFG[k]?.label||k}</span>
    <button class="del-btn" onclick="mbRemoveBrandRow('${id}','${k}')" style="width:22px;height:22px;"><i class="ti ti-x" style="font-size:11px;"></i></button>`;
  list.appendChild(div);
  sel.querySelector(`option[value="${k}"]`)?.remove();
  sel.value = '';
};

window.mbRemoveBrandRow = function(id, k) {
  const list = document.getElementById('mb-brand-list-'+id);
  if (!list) return;
  list._brands = list._brands.filter(b=>b!==k);
  document.getElementById(`mb-brand-row-${id}-${k}`)?.remove();
  const sel = document.getElementById('mb-brand-add-select-'+id);
  if (sel) { const opt = document.createElement('option'); opt.value=k; opt.textContent=BRAND_CFG[k]?.label||k; sel.appendChild(opt); }
};

window.mbSaveProduct = async function(id) {
  const p = productsData.find(x=>x.id===id);
  if (!p || !p.docId) return;
  const name   = document.getElementById('mb-ep-name-'+id)?.value.trim();
  const price  = parseFloat(document.getElementById('mb-ep-price-'+id)?.value)||0;
  const min    = parseInt(document.getElementById('mb-ep-min-'+id)?.value)||0;
  const list   = document.getElementById('mb-brand-list-'+id);
  const brands = list?._brands || [];
  if (!name) { alert('กรุณากรอกชื่อสินค้า'); return; }
  await updateDoc(doc(db,'products',p.docId), {name, price, min, brands, brand:brands[0]||p.brand, updatedAt:serverTimestamp()});
};

window.mbAddNpBrandRow = function() {
  const sel = document.getElementById('mb-np-brand-add-select');
  const k = sel?.value;
  if (!k) return;
  const list = document.getElementById('mb-np-brand-list');
  if (!list) return;
  if (!list._brands) list._brands = [];
  if (list._brands.includes(k)) return;
  list._brands.push(k);
  const bc = {pleno:'b-pleno',grande:'b-grande',bkm:'b-bkm',bkme:'b-bkme',bkmc:'b-bkmc',api:'b-api',dist:'b-dist'}[k]||'b-ok';
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:8px;border:0.5px solid var(--border);margin-bottom:4px;';
  div.innerHTML = `<span class="badge ${bc}">${BRAND_CFG[k]?.label||k}</span>
    <button class="del-btn" onclick="this.closest('div').remove();document.getElementById('mb-np-brand-list')._brands=document.getElementById('mb-np-brand-list')._brands.filter(b=>b!=='${k}');document.getElementById('mb-np-brand-add-select').add(new Option('${BRAND_CFG[k]?.label||k}','${k}'))" style="width:22px;height:22px;"><i class="ti ti-x" style="font-size:11px;"></i></button>`;
  list.appendChild(div);
  sel.querySelector(`option[value="${k}"]`)?.remove();
  sel.value = '';
};

window.mbAddProduct = async function() {
  const id    = document.getElementById('mb-np-prod-id')?.value.trim().toUpperCase();
  const code  = document.getElementById('mb-np-prod-code')?.value.trim();
  const name  = document.getElementById('mb-np-prod-name')?.value.trim();
  const price = parseFloat(document.getElementById('mb-np-prod-price')?.value)||0;
  const min   = parseInt(document.getElementById('mb-np-prod-min')?.value)||0;
  const list  = document.getElementById('mb-np-brand-list');
  const brands = list?._brands || [];
  if (!id || !name) { alert('กรุณากรอก ID และชื่อสินค้า'); return; }
  if (productsData.find(p=>p.id===id)) { alert('ID นี้มีอยู่แล้ว'); return; }
  await addDoc(collection(db,'products'), {id, code:code||`DDL-${id}`, name, vendor:'CIT', brand:brands[0]||'pleno', brands, price, min, updatedAt:serverTimestamp()});
  await addDoc(collection(db,'stock'), {productId:id, qty:0, updatedAt:serverTimestamp()});
  ['mb-np-prod-id','mb-np-prod-code','mb-np-prod-name','mb-np-prod-price','mb-np-prod-min'].forEach(i=>{const el=document.getElementById(i);if(el)el.value='';});
  if (list) { list.innerHTML=''; list._brands=[]; }
};

  cell.innerHTML = `

      style="width:64px;height:36px;border:1.5px solid #534AB7;border-radius:8px;font-size:16px;font-weight:500;text-align:center;${qc}font-family:var(--font);outline:none;"
      onkeydown="if(event.key==='Enter')mbSaveQty('${productId}','${docId}')">

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
              <select class="form-select" data-edit id="mb-ht-lock-${p.docId}" style="height:32px;font-size:12px;">${htLockOptions(p.brand)}</select>
              <select class="form-select" data-edit id="mb-ht-status-${p.docId}" style="height:32px;font-size:12px;">
                <option value="built">ก่อสร้างแล้ว</option>
                <option value="waiting">รอก่อสร้าง</option>
                <option value="pending">ยังไม่เริ่ม</option>
              </select>
            </div>
            <button class="tb-btn primary" data-edit style="height:32px;font-size:12px;justify-content:center;" onclick="mbAddHouseType('${p.docId}')"><i class="ti ti-plus"></i> เพิ่ม Type</button>
          </div>
        </div>
      </div>`;
    }).join('') || '<div style="font-size:12px;color:var(--text3);padding:10px 0;text-align:center;">ไม่พบโครงการ</div>';
  }

  const hd = mbHd(cfg.label, `${projs.length} โครงการ`,
    `<button onclick="window.renderProjectsMobile()" style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.15);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;"><i class="ti ti-arrow-left" style="font-size:16px;color:#fff;" aria-hidden="true"></i></button>`
  );

  document.getElementById('main-content').innerHTML = `
    ${hd}
    <div style="padding:12px 14px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:10px;">
      <div style="position:relative;">
        <i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);" aria-hidden="true"></i>
        <input style="width:100%;height:36px;border:1px solid var(--border2);border-radius:8px;padding:0 10px 0 34px;font-size:13px;background:var(--bg2);color:var(--text);font-family:var(--font);"
          placeholder="ค้นหารหัสหรือชื่อโครงการ..."
          autocomplete="off" oninput="filterMbBrandProjs(this.value,'${brandKey}',renderMbRows_${brandKey.replace(/[^a-z]/g,'')})">
      </div>
      ${mbCard('',`<div id="mb-brand-proj-rows">${renderMbProjRows(projs)}</div>`)}
    </div>
    ${mbBn('projects')}`;

  window['renderMbRows_'+brandKey.replace(/[^a-z]/g,'')] = renderMbProjRows;
  applyEditState();
};

window.filterMbBrandProjs = function(q, brandKey, renderFn) {
  const projs = projectsData.filter(p => p.brand === brandKey);
  const filtered = q ? projs.filter(p => p.plantId.includes(q) || p.name.toLowerCase().includes(q.toLowerCase())) : projs;
  document.getElementById('mb-brand-proj-rows').innerHTML = renderFn(filtered);
  applyEditState();
};
window.mbAddProject = async function() {
  const plantId = document.getElementById('mb-np-plant')?.value.trim();
  const name    = document.getElementById('mb-np-name')?.value.trim();
  const brand   = document.getElementById('mb-np-brand')?.value;
  const seg     = parseInt(document.getElementById('mb-np-seg')?.value)||0;
  const unit    = parseInt(document.getElementById('mb-np-unit')?.value)||0;
  const ri      = parseInt(document.getElementById('mb-np-ri')?.value)||0;
  const fy      = parseFloat(document.getElementById('mb-np-fy')?.value)||0;
  const fq      = parseFloat((fy/4).toFixed(2));
  const fm      = parseFloat((fy/12).toFixed(2));
  if (!plantId || !name) { alert('กรุณากรอก Plant ID และชื่อโครงการ'); return; }
  const product = Object.entries(PRODUCT_TO_BRAND).find(([,v])=>v===brand)?.[0]||brand;
  await addDoc(collection(db,'projects'), {
    plantId, name, product, brand, bg:'TH', segment:seg,
    totalUnit:unit, notStarted:0, remaining2026:0, remainingInstall:ri,
    fcYear:fy, fcQuarter:fq, fcMonth:fm, driveLink:'', houseTypes:[],
    updatedAt:serverTimestamp()
  });
  window.renderProjectsMobile();
};

window.mbToggleHT = function(docId) {
  const el = document.getElementById('mb-ht-'+docId);
  if (!el) return;
  const isOpen = el.style.display === 'flex';
  el.style.display = isOpen ? 'none' : 'flex';
  el.style.flexDirection = 'column';
  if (!isOpen) applyEditState();
};

window.mbAddHouseType = async function(docId) {
  const p = projectsData.find(x=>x.docId===docId);
  if (!p) return;
  const typeName = document.getElementById('mb-ht-name-'+docId)?.value.trim();
  const units    = parseInt(document.getElementById('mb-ht-units-'+docId)?.value)||0;
  const doorLock = document.getElementById('mb-ht-lock-'+docId)?.value||'';
  const status   = document.getElementById('mb-ht-status-'+docId)?.value||'built';
  if (!typeName) { alert('กรุณากรอกชื่อ Type'); return; }
  const types = [...(p.houseTypes||[]), {typeName, units, doorLock, status, note:''}];
  await updateDoc(doc(db,'projects',docId), {houseTypes:types, updatedAt:serverTimestamp()});
  const idx = projectsData.findIndex(x=>x.docId===docId);
  if (idx>=0) projectsData[idx].houseTypes = types;
  window.renderProjectsMobile();
};

window.mbDeleteHouseType = async function(docId, index) {
  const p = projectsData.find(x=>x.docId===docId);
  if (!p) return;
  if (!confirm('ลบ Type นี้ออก?')) return;
  const types = (p.houseTypes||[]).filter((_,i)=>i!==index);
  await updateDoc(doc(db,'projects',docId), {houseTypes:types, updatedAt:serverTimestamp()});
  const idx = projectsData.findIndex(x=>x.docId===docId);
  if (idx>=0) projectsData[idx].houseTypes = types;
  window.renderProjectsMobile();
};

window.mbEditProj = function(docId) {
  const editDiv = document.getElementById('mb-edit-'+docId);
  if (editDiv) { editDiv.style.display='flex'; editDiv.style.flexDirection='column'; }
};
window.mbCancelProj = function(docId) {
  const editDiv = document.getElementById('mb-edit-'+docId);
  if (editDiv) editDiv.style.display='none';
};
window.mbSaveProj = async function(docId) {
  const name = document.getElementById('mb-name-'+docId)?.value.trim();
  const seg  = parseInt(document.getElementById('mb-seg-'+docId)?.value)||0;
  const unit = parseInt(document.getElementById('mb-unit-'+docId)?.value)||0;
  const ns   = parseInt(document.getElementById('mb-ns-'+docId)?.value)||0;
  const ri   = parseInt(document.getElementById('mb-ri-'+docId)?.value)||0;
  const fy   = parseFloat(document.getElementById('mb-fy-'+docId)?.value)||0;
  const fq   = parseFloat(document.getElementById('mb-fq-'+docId)?.value)||0;
  const fm   = parseFloat(document.getElementById('mb-fm-'+docId)?.value)||0;
  const drive  = document.getElementById('mb-drive-'+docId)?.value.trim()||'';
  if (!name) { alert('กรุณากรอกชื่อโครงการ'); return; }
  await updateDoc(doc(db,'projects',docId), {
    name, segment:seg, totalUnit:unit, notStarted:ns,
    remainingInstall:ri, fcYear:fy, fcQuarter:fq, fcMonth:fm,
    driveLink:drive, updatedAt:serverTimestamp()
  });
  const idx = projectsData.findIndex(x => x.docId === docId);
  if (idx >= 0) Object.assign(projectsData[idx], {name, segment:seg, totalUnit:unit, notStarted:ns, remainingInstall:ri, fcYear:fy, fcQuarter:fq, fcMonth:fm, driveLink:drive});
  window.renderProjectsMobile();
};
window.filterProjMobile = function(btn, brand) {
  btn.closest('div').querySelectorAll('button[onclick*="filterProjMobile"]').forEach(c=>{
    c.style.cssText=`font-size:11px;padding:4px 12px;border-radius:999px;white-space:nowrap;flex-shrink:0;cursor:pointer;${MB_CHIP}`;
  });
  btn.style.cssText=`font-size:11px;padding:4px 12px;border-radius:999px;white-space:nowrap;flex-shrink:0;cursor:pointer;${MB_CHIP_ON}`;
  document.querySelectorAll('#proj-rows-mb > div').forEach(d=>{
    d.style.display=(brand==='all'||d.dataset.brand===brand)?'':'none';
  });
};

let lastMobile = isMobile();
window.addEventListener('resize', () => {
  const nowMobile = isMobile();
  if (nowMobile !== lastMobile) {
    lastMobile = nowMobile;
    renderTab(currentTab);
  }
});

async function main() {
  await initFirestore();
  await seedProjects();
  await seedProducts();
  await migrateProductBrands();
  await loadCustomFC();
  startListeners();
  renderTab('overview');
}
main().catch(console.error);
</script>
</body>
</html>
