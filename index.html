<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Stock Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f8f8f8;--bg2:#ffffff;--bg3:#f2f2f0;
  --border:#e5e5e3;--border2:#d4d4d0;
  --text:#1a1a18;--text2:#6b6b68;--text3:#9b9b98;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --green:#1D9E75;--green-light:#E1F5EE;
  --red:#E24B4A;--red-light:#FCEBEB;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --radius:8px;--radius-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;}
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;background:#1e1b4b;display:flex;flex-direction:column;flex-shrink:0;}
.sb-logo{padding:14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo-box{width:28px;height:28px;background:var(--purple);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0;}
.sb-logo-text{font-size:13px;font-weight:600;color:#fff;}
.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.4);}
.sb-sec{padding:10px 12px 3px;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.06em;text-transform:uppercase;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 11px;margin:1px 8px;border-radius:7px;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .12s;border:none;background:none;width:calc(100% - 16px);text-align:left;}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.sb-item.active{background:var(--purple);color:#fff;}
.sb-item i{font-size:15px;flex-shrink:0;}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:999px;}
.sb-bottom{margin-top:auto;padding:10px;border-top:1px solid rgba(255,255,255,.08);}
.sb-user{display:flex;align-items:center;gap:8px;padding:7px;}
.sb-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.sb-uname{font-size:11px;font-weight:500;color:rgba(255,255,255,.8);}
.sb-urole{font-size:10px;color:rgba(255,255,255,.35);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.topbar-title{font-size:14px;font-weight:600;flex:1;}
.tb-btn{font-size:11px;padding:4px 12px;border-radius:999px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;}
.tb-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.content{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;}
.card-hd{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.metric-lbl{font-size:11px;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.metric-val{font-size:24px;font-weight:700;}
.metric-sub{font-size:10px;color:var(--text3);margin-top:2px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;font-size:10px;font-weight:600;color:var(--text2);padding:5px 10px 7px;border-bottom:1px solid var(--border);}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg3);}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;}
.b-pleno{background:#E6F1FB;color:#0C447C;}
.b-grande{background:#EEEDFE;color:#3C3489;}
.b-bkm{background:#E1F5EE;color:#085041;}
.b-bkme{background:#FAEEDA;color:#633806;}
.b-bkmc{background:#FAECE7;color:#712B13;}
.b-api{background:#EAF3DE;color:#27500A;}
.b-dist{background:#F1EFE8;color:#444441;}
.b-ok{background:#EAF3DE;color:#27500A;}
.b-low{background:#FAEEDA;color:#633806;}
.b-crit{background:#FCEBEB;color:#791F1F;}
.b-pr-open{background:#FAEEDA;color:#633806;}
.b-pr-wait{background:#E6F1FB;color:#0C447C;}
.b-pr-done{background:#EAF3DE;color:#27500A;}
.alert-banner{background:#FCEBEB;border:1px solid #F09595;border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;}
.ai-box{background:var(--purple-light);border-radius:var(--radius);padding:11px 13px;}
.ai-lbl{font-size:10px;font-weight:600;color:#3C3489;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.ai-txt{font-size:11px;color:var(--purple);line-height:1.6;}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chip{font-size:11px;padding:3px 12px;border-radius:999px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;}
.chip.active{background:var(--purple);color:#fff;border-color:var(--purple);}
.toggle-group{display:flex;background:var(--bg3);border-radius:999px;padding:2px;gap:2px;}
.toggle-btn{font-size:11px;padding:3px 12px;border-radius:999px;border:none;background:none;color:var(--text2);cursor:pointer;}
.toggle-btn.active{background:var(--bg2);color:var(--text);font-weight:600;box-shadow:0 0 0 1px var(--border);}
.chart-wrap{height:120px;display:flex;align-items:flex-end;gap:6px;padding-top:10px;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.bar{border-radius:3px 3px 0 0;width:100%;}
.bar-lbl{font-size:9px;color:var(--text3);text-align:center;}
.bar-val{font-size:9px;color:var(--text2);}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);}
.form-input,.form-select{height:32px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;font-size:12px;background:var(--bg2);color:var(--text);width:100%;font-family:var(--font);}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--purple);}
.qty-input{width:64px;height:26px;border:1px solid var(--border2);border-radius:5px;padding:0 8px;font-size:11px;text-align:center;font-family:var(--font);}
.qty-input:focus{outline:none;border-color:var(--purple);}
.edit-btn{font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;}
.save-btn{font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--purple);background:var(--purple);color:#fff;cursor:pointer;}
.del-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.del-btn:hover{background:#FCEBEB;color:#A32D2D;border-color:#F09595;}
.search-wrap{position:relative;}
.search-input{height:32px;width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px 0 32px;font-size:12px;background:var(--bg2);color:var(--text);font-family:var(--font);}
.search-input:focus{outline:none;border-color:var(--purple);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none;}
.search-dropdown{position:absolute;top:34px;left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);z-index:100;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.search-dropdown.open{display:block;}
.search-item{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);}
.search-item:last-child{border:none;}
.search-item:hover{background:var(--bg3);}
.search-item-id{font-weight:600;color:var(--purple);margin-right:6px;}
.pr-line-item{display:grid;grid-template-columns:1fr 80px 24px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.pr-line-item:last-child{border:none;}
.withdraw-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.withdraw-item:last-child{border:none;}
.drill-row{cursor:pointer;}
.drill-row:hover td{background:var(--bg3);}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--purple);cursor:pointer;margin-bottom:10px;background:none;border:none;font-family:var(--font);}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);flex-direction:column;gap:10px;}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── EDIT-ONLY LOCK ── */
.edit-only{pointer-events:none;opacity:0.35;user-select:none;transition:opacity .15s;}
.app-edit-mode .edit-only{pointer-events:auto;opacity:1;user-select:auto;}

@media(max-width:768px){
  .sidebar{display:none;}
  .shell{flex-direction:column;}
  .main{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:none;}
  .content{flex:1;overflow:hidden;padding:0;display:flex;flex-direction:column;}
  .metrics{grid-template-columns:1fr 1fr;gap:8px;}
  .two-col,.three-col{grid-template-columns:1fr;}
  .card{overflow-x:auto;}
}
</style>
</head>
<body>
<div class="shell">

        <div class="sb-avatar">AP</div>
        <div><div class="sb-uname">AP Stock</div><div class="sb-urole">BG2 · 2026–2027</div></div>

<!-- PIN OVERLAY -->
<div id="pin-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border-radius:16px;padding:28px 32px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.18);text-align:center;">

    <div style="font-size:12px;color:var(--text2);margin-bottom:18px;">กรอก PIN เพื่อ unlock</div>
    <input id="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="••••••"
      style="width:100%;height:44px;border:1.5px solid var(--border2);border-radius:10px;padding:0 14px;font-size:20px;text-align:center;letter-spacing:6px;font-family:var(--font);background:var(--bg);color:var(--text);outline:none;"
      onkeydown="if(event.key==='Enter')confirmPIN()">
    <div id="pin-error" style="font-size:11px;color:var(--red);margin-top:8px;min-height:16px;"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button onclick="closePINOverlay()" style="flex:1;height:38px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-size:13px;">ยกเลิก</button>
      <button onclick="confirmPIN()" style="flex:1;height:38px;border-radius:8px;border:none;background:#534AB7;color:#fff;cursor:pointer;font-size:13px;font-weight:500;">ยืนยัน</button>
    </div>
  </div>
</div>

// ── PIN / EDIT MODE ──
const EDIT_PIN = '599388';
let editMode = false;

window.openPINOverlay = function() {
  document.getElementById('pin-overlay').style.display = 'flex';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').textContent = '';
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
};
window.closePINOverlay = function() {
  document.getElementById('pin-overlay').style.display = 'none';
};
window.confirmPIN = function() {
  const val = document.getElementById('pin-input').value.trim();
  if (val === EDIT_PIN) {
    editMode = true;
    closePINOverlay();
    updateEditModeUI();
    renderTab(currentTab);
  } else {
    document.getElementById('pin-error').textContent = 'PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
};
window.exitEditMode = function() {
  editMode = false;
  updateEditModeUI();
  renderTab(currentTab);
};

function updateEditModeUI() {
  // toggle CSS class บน body — ควบคุม .edit-only ทั้งหมดในครั้งเดียว
  document.body.classList.toggle('app-edit-mode', editMode);

  // desktop topbar button
  const btn = document.getElementById('edit-mode-btn');
  if (btn) {
    if (editMode) {
      btn.innerHTML = '<i class="ti ti-lock-open"></i> โหมดแก้ไข';
      btn.style.background = '#534AB7';
      btn.style.color = '#fff';
      btn.style.borderColor = '#534AB7';
      btn.onclick = exitEditMode;
    } else {
      btn.innerHTML = '<i class="ti ti-lock"></i> แก้ไข';
      btn.style.background = 'none';
      btn.style.color = 'var(--text2)';
      btn.style.borderColor = 'var(--border2)';
      btn.onclick = openPINOverlay;
    }
  }
  // mobile: re-render เพื่ออัปเดต lock icon ใน header
  if (isMobile()) renderTab(currentTab);
}

// helper — lock button สำหรับ mobile header
function mbLockBtn() {
  if (editMode) {
    return `<button onclick="exitEditMode()" style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.9);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;" title="ออกโหมดแก้ไข">
      <i class="ti ti-lock-open" style="font-size:16px;color:#534AB7;" aria-hidden="true"></i>
    </button>`;
  }
  return `<button onclick="openPINOverlay()" style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.15);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;" title="unlock เพื่อแก้ไข">
    <i class="ti ti-lock" style="font-size:16px;color:rgba(255,255,255,.7);" aria-hidden="true"></i>
  </button>`;
}

let stockInitDone = false;
async function initFirestore() {
  if (stockInitDone) return;
  stockInitDone = true;
  const stockSnap = await getDocs(collection(db, 'stock'));
  if (stockSnap.empty) {
    const def = {Y02K:50,Y02H:67,J03:28,J03P:9,P60:54,A2H:82,A2K:45,A100:22,EST:14};
    for (const [id, qty] of Object.entries(def)) {
      await addDoc(collection(db, 'stock'), {productId:id, qty, updatedAt:serverTimestamp()});
    }
  }
}

function startListeners() {
  onSnapshot(collection(db, 'stock'), snap => {
    snap.forEach(d => { stockData[d.data().productId] = {docId:d.id, qty:d.data().qty}; });
    if (currentTab === 'inventory') renderTab('inventory');
    if (currentTab === 'overview') renderTab('overview');
  });
  onSnapshot(query(collection(db, 'pr'), orderBy('createdAt','desc')), snap => {
    prList = snap.docs.map(d => ({docId:d.id, ...d.data()}));
    renderPRBadge();
    if (currentTab === 'pr') renderTab('pr');
    if (currentTab === 'overview') renderTab('overview');
  });
  onSnapshot(query(collection(db, 'withdrawLog'), orderBy('createdAt','desc')), snap => {
    withdrawLog = snap.docs.map(d => ({docId:d.id, ...d.data()}));
    if (currentTab === 'withdraw' && !selectedProject) renderTab('withdraw');
    if (currentTab === 'overview') renderTab('overview');
  });
}

function renderTab(id) {
  if (isMobile()) {
    switch(id) {
      case 'overview': renderOverviewMobile(); break;
      case 'inventory': renderInventoryMobile(); break;
      case 'withdraw': renderWithdrawMobile(); break;
      case 'pr': renderPRMobile(); break;
      case 'forecast': renderForecast(); break;

function getStatus(id) {
  const qty = stockData[id]?.qty ?? 0;
  const p = PRODUCTS.find(x => x.id === id);
  const min = p?.min ?? 0;
  if (qty >= min) return {cls:'b-ok',txt:'OK'};
  if (qty >= min * 0.6) return {cls:'b-low',txt:'ต่ำ'};
  return {cls:'b-crit',txt:'วิกฤต'};
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

window.selectProject = function(id, name, brand) {

window.confirmWithdraw = async function() {
  if (!selectedProject) return;
  const items = (BRAND_ITEMS[selectedProject.brand]||[]).map(pid=>PRODUCTS.find(p=>p.id===pid)).filter(Boolean);
  let ok = false;
  for (const it of items) {
    const q = parseInt(document.getElementById('wd-'+it.id)?.value)||0;
    if (q > 0) {
      ok = true;
      const docId = stockData[it.id]?.docId;
      const newQty = Math.max(0,(stockData[it.id]?.qty||0)-q);
      if (docId) await updateDoc(doc(db,'stock',docId),{qty:newQty,updatedAt:serverTimestamp()});
      await addDoc(collection(db,'withdrawLog'),{
        project:selectedProject.name, projectId:selectedProject.id,
        product:it.name, productId:it.id, qty:q,
        brand:selectedProject.brand, note:document.getElementById('wd-note')?.value||'',
        createdAt:serverTimestamp()
      });
    }
  }
  if (!ok) { alert('กรุณากรอกจำนวนที่ต้องการเบิก'); return; }
  selectedProject = null;
  const searchEl = document.getElementById('wd-search') || document.getElementById('wd-search-mb');
  if (searchEl) searchEl.value = '';
  document.getElementById('wd-selected').textContent = '';
  document.getElementById('wd-items').style.display = 'none';
  document.getElementById('wd-placeholder').style.display = '';
};

window.addPRLine = function() {
  const id = Date.now();
  const div = document.createElement('div');
  div.className='pr-line-item'; div.id='prl-'+id;
  div.innerHTML = `<select class="form-select" style="height:28px;font-size:11px;">${PRODUCTS.map(p=>`<option>${p.name}</option>`).join('')}</select><input class="qty-input" type="number" placeholder="จำนวน" min="1" style="width:100%;"><button class="del-btn" onclick="document.getElementById('prl-${id}').remove()"><i class="ti ti-x"></i></button>`;
  document.getElementById('pr-lines')?.appendChild(div);
};
window.submitPR = async function() {
  const num = document.getElementById('pr-num')?.value.trim();
  if (!num) { alert('กรุณากรอกเลขที่ PR'); return; }
  const lineEls = document.querySelectorAll('#pr-lines .pr-line-item');
  if (!lineEls.length) { alert('กรุณาเพิ่มรายการสินค้า'); return; }
  const lines = [];
  lineEls.forEach(el=>{const sel=el.querySelector('select');const inp=el.querySelector('input');const q=parseInt(inp?.value)||0;if(q>0)lines.push({product:sel.value,qty:q});});
  if (!lines.length) { alert('กรุณากรอกจำนวนสินค้า'); return; }
  const projVal = document.getElementById('pr-project')?.value.split('|');
  await addDoc(collection(db,'pr'),{prNum:num,project:projVal?.[1]||'',projectId:projVal?.[0]||'',vendor:document.getElementById('pr-vendor')?.value.split(' ·')[0]||'',lines,status:'open',createdAt:serverTimestamp()});
};
window.updatePR = async function(docId, newStatus) {
  await updateDoc(doc(db,'pr',docId),{status:newStatus});
  if (newStatus==='done') {
    try {
      const pr = prList.find(p => p.docId === docId);
      const lines = pr?.lines || [];
      for (const l of lines) {
        const sid = STOCK_MAP[l.product];
        if (sid && stockData[sid]?.docId) {
          await updateDoc(doc(db,'stock',stockData[sid].docId),{qty:(stockData[sid]?.qty||0)+l.qty,updatedAt:serverTimestamp()});
        }
      }
    } catch(e) { console.error(e); }
  }
};

window.renderProjectsMobile = function() {
  const brandKeys=['all','pleno','grande','bkm','bkme','api','dist'];
  const brandLabels=['ทั้งหมด','Pleno','Grande','BKM','BKM Edition','Apitown','District'];
  const chipBar=brandLabels.map((l,i)=>mbChip(l,i===0,`filterProjMobile(this,'${brandKeys[i]}')`)).join('');
  const hd=mbHd('โครงการ','153 โครงการ · 7 Brands','',chipBar);

  const allProjs=Object.entries(BRAND_DATA).flatMap(([key,d])=>
    d.projects.map(p=>({key,d,p}))
  );
  const rows=allProjs.map(({key,d,p})=>{
    const bmap={pleno:['#EEEDFE','#534AB7'],grande:['#EEEDFE','#534AB7'],bkm:['#E1F5EE','#0F6E56'],bkme:['#FAEEDA','#633806'],bkmc:['#FAECE7','#712B13'],api:['#EAF3DE','#3B6D11'],dist:['#F1EFE8','#444441']};
    const [ibg,ic]=bmap[key]||bmap.pleno;
    const pct=parseFloat(p[5]||0);
    const progW=Math.round(pct/Math.max(...allProjs.map(x=>parseFloat(x.p[5]||0)))*100)+'%';
    return {key, html:`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--border);">
      <div style="width:34px;height:34px;border-radius:9px;background:${ibg};display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="ti ti-home" style="font-size:16px;color:${ic};" aria-hidden="true"></i></div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:500;">${p[1]}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:1px;">${p[0]} · ${p[3]} ยูนิต · <span style="background:${ibg};color:${ic};font-size:10px;padding:1px 6px;border-radius:999px;">${d.label}</span></div>
      <div style="height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px;"><div style="height:100%;width:${progW};background:${ic};border-radius:2px;"></div></div></div>
      <div style="font-size:14px;font-weight:500;color:${ic};">${p[5]}</div>
    </div>`};
  });

  document.getElementById('main-content').innerHTML = `
    ${hd}
    <div style="padding:12px 14px;overflow-y:auto;flex:1;">
      ${mbCard('',`<div id="proj-rows-mb">${rows.map(({key,html})=>`<div data-brand="${key}">${html}</div>`).join('')}</div>`)}
    </div>
    ${mbBn('projects')}`;
};
window.filterProjMobile = function(btn, brand) {

    c.style.cssText=`font-size:11px;padding:4px 12px;border-radius:999px;white-space:nowrap;flex-shrink:0;cursor:pointer;${MB_CHIP}`;
  });
  btn.style.cssText=`font-size:11px;padding:4px 12px;border-radius:999px;white-space:nowrap;flex-shrink:0;cursor:pointer;${MB_CHIP_ON}`;
  document.querySelectorAll('#proj-rows-mb > div').forEach(d=>{

};

let lastMobile = isMobile();
window.addEventListener('resize', () => {
  const nowMobile = isMobile();
  if (nowMobile !== lastMobile) {
    lastMobile = nowMobile;
    renderTab(currentTab);
  }
});

async function main() {
  await initFirestore();
  startListeners();
  renderTab('overview');
}
main().catch(console.error);
